<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡NO LO TOQUES!</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff003c; --bg: #121212; }
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; user-select: none; }

        body {
            background-color: var(--bg);
            font-family: 'Bungee', cursive;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; color: white;
        }

        /* El Escenario */
        #game-area {
            position: relative; width: 100vw; height: 70vh;
            display: flex; align-items: center; justify-content: center;
        }

        /* El Botón de Fernanfloo Style */
        #the-button {
            width: 150px; height: 150px; background: var(--red);
            border-radius: 50%; border: 8px solid #80001d;
            box-shadow: 0 10px 0 #80001d, 0 0 50px rgba(255, 0, 60, 0.5);
            cursor: pointer; position: relative; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            font-size: 50px; transition: transform 0.1s, top 0.2s, left 0.2s;
        }
        #the-button:active { transform: translateY(10px) scale(0.95); box-shadow: 0 0 0 #80001d; }

        /* Mensajes Troll */
        #msg-bubble {
            position: absolute; top: 10%; width: 80%;
            background: white; color: black; padding: 15px;
            border-radius: 15px; font-family: 'Press Start 2P', cursive;
            font-size: 12px; text-align: center; line-height: 1.6;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            animation: float 2s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Efectos Especiales */
        .shake { animation: shakeBtn 0.2s infinite; }
        @keyframes shakeBtn { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } }

        .glitch { background: #00f5d4 !important; border-color: #00bfa5 !important; }

        /* Pantalla Final */
        #win-screen {
            position: fixed; inset: 0; background: #39ff14;
            display: none; flex-direction: column; align-items: center;
            justify-content: center; z-index: 100; text-align: center; color: black;
        }
    </style>
</head>
<body>

    <div id="msg-bubble">NO TOQUES EL BOTÓN ROJO. ADVERTIDA ESTÁS.</div>

    <div id="game-area">
        <div id="the-button" onclick="handlePress()">🦁</div>
    </div>

    <div id="win-screen">
        <h1 style="font-size: 50px;">¡TE RINDES!</h1>
        <p style="margin: 20px;">Después de tanto trolleo, admito que me quieres.</p>
        <div style="font-size: 80px;">🦁❤️👸🏻</div>
        <button onclick="location.reload()" style="padding:10px 20px; font-family:'Bungee';">VOLVER A EMPEZAR</button>
    </div>

    <script>
        const btn = document.getElementById('the-button');
        const bubble = document.getElementById('msg-bubble');
        let clicks = 0;

        const trollMessages = [
            "Te dije que no lo tocaras...", "Jajaja, ¡qué terca eres!", "A ver, ¿otra vez?", 
            "¿Eres Jhanny o una niña pequeña?", "¡Oye! Eso dolió.", "Mi abuela es más obediente.",
            "Si lo tocas otra vez, explota.", "3... 2... 1... ¡Mentira! 😂", "Instalando virus de amor...",
            "Error: Usuario demasiado curioso.", "¡BUM! ... Casi.", "¿Ya te cansaste?",
            "El León se está enojando...", "¡Trolleadísima!", "Deja de picarme.",
            "Si sigues, llamo a la policía.", "¿No tienes nada mejor que hacer?", "¡Ups! Casi se me sale el SÍ.",
            "¡No me toques ahí!", "Cada clic es un beso que me debes.", "¡Vaya fail de Jhanny!",
            "Esa mano, ¡quieta!", "¡Me voy a otro lado!", "¡Ja! Te gané en velocidad.",
            "¿Estás llorando ya?", "¡Ríndete, por favor!", "No hay nada al final, en serio.",
            "¡Me muero de la risa!", "¡Esa puntería es de nivel 1!", "¡Mira un pajarito! 🐦",
            "Sigue intentando, exploradora.", "¿Ya terminaste?", "¡Qué pesada!",
            "El botón de SÍ se acaba de ir de viaje.", "No sirves para esto.", "¡Atrapado!",
            "Jajaja, ¡otra vez fallaste!", "¡Qué risa me das!", "Me estoy quedando sin frases.",
            "¿Te ríndes? Presiona una vez más..."
        ];

        function handlePress() {
            clicks++;
            
            // 1. Cambiar el mensaje (40 mensajes)
            if (clicks < trollMessages.length) {
                bubble.innerText = trollMessages[clicks];
            } else {
                document.getElementById('win-screen').style.display = 'flex';
            }

            // 2. Comportamiento del botón según el nivel de "enojo"
            if (clicks > 5) {
                // El botón empieza a saltar
                moveButton();
            }

            if (clicks > 15) {
                // El botón se vuelve loco (glitch)
                btn.classList.add('glitch');
                setTimeout(() => btn.classList.remove('glitch'), 150);
            }

            if (clicks > 25) {
                // El botón se hace pequeño
                btn.style.transform = 'scale(0.5)';
            }

            if (clicks === 35) {
                // Sacudida de pantalla
                document.body.style.backgroundColor = 'white';
                setTimeout(() => document.body.style.backgroundColor = '#121212', 100);
            }
        }

        function moveButton() {
            const area = document.getElementById('game-area');
            const maxX = area.clientWidth - btn.clientWidth;
            const maxY = area.clientHeight - btn.clientHeight;
            
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            btn.style.position = 'absolute';
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }
    </script>
</body>
</html>
