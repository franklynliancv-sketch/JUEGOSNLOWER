<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para mi Jhanny ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --rosa-amor: #ff4d6d;
            --rosa-suave: #fff0f3;
            --dorado: #ffb703;
            --texto: #590d22;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; user-select: none; }

        body {
            background-color: var(--rosa-suave);
            font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; color: var(--texto);
        }

        /* TÍTULO Y ESTADÍSTICAS */
        #header {
            text-align: center; margin-bottom: 20px; z-index: 10;
        }
        h1 { font-family: 'Dancing Script', cursive; font-size: 3rem; color: var(--rosa-amor); text-shadow: 2px 2px 0px white; }
        .stats { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--rosa-amor); }

        /* EL NARRADOR TROLL */
        #troll-bubble {
            background: white; color: black; padding: 15px; border-radius: 15px;
            font-family: 'Press Start 2P', cursive; font-size: 10px; line-height: 1.6;
            width: 80%; max-width: 400px; text-align: center;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.2);
            margin-bottom: 30px; z-index: 10;
            border: 2px solid var(--rosa-amor);
            animation: float 2s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* EL ÁREA DE JUEGO */
        #game-area {
            position: relative; width: 100vw; height: 50vh;
            display: flex; align-items: center; justify-content: center;
        }

        /* EL BOTÓN (Ahí está el trolleo) */
        #the-button {
            width: 130px; height: 130px; background: var(--rosa-amor);
            border-radius: 50%; border: 6px solid #c9184a;
            box-shadow: 0 10px 0 #c9184a, 0 0 30px rgba(255, 77, 109, 0.4);
            cursor: pointer; position: absolute; z-index: 50;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; transition: transform 0.1s, top 0.4s ease-out, left 0.4s ease-out;
        }
        #the-button:active { transform: translateY(10px) scale(0.95); box-shadow: 0 0 0 #c9184a; }

        /* PANTALLA FINAL */
        #win-screen {
            position: fixed; inset: 0; background: var(--rosa-amor);
            display: none; flex-direction: column; align-items: center;
            justify-content: center; z-index: 100; text-align: center; color: white;
            padding: 20px;
        }

        /* EFECTOS VISUALES */
        .confetti { position: absolute; width: 10px; height: 10px; background: var(--dorado); border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>

    <div id="header">
        <h1>Para Jhanny</h1>
        <div class="stats">Nivel: <span id="lvl">1</span>/3 | Intentos: <span id="clicks">0</span></div>
    </div>

    <div id="troll-bubble">¿Podrás atrapar el "SÍ" de este León? Jajaja.</div>

    <div id="game-area">
        <div id="the-button" onclick="handlePress()">🦁</div>
    </div>

    <div id="win-screen">
        <h1 style="font-family: 'Dancing Script'; font-size: 4rem;">¡BOOYAH! ❤️</h1>
        <p style="margin: 20px 0; font-size: 1.2rem;">Jhanny, eres persistente... ¡Me encanta! Admitiré que te ganaste mi "SÍ" y mi corazón.</p>
        <div style="font-size: 80px;">🦁💖👸🏻</div>
        <button onclick="location.reload()" style="margin-top: 30px; padding: 10px 20px; border-radius: 10px; border: none; font-weight: bold; background: white; color: var(--rosa-amor);">REPETIR</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const btn = document.getElementById('the-button');
        const bubble = document.getElementById('troll-bubble');
        let clicks = 0;
        let level = 1;
        let btnMoving = false;

        const trollMessages = [
            "¿Tú me quieres? Jajaja a ver si es cierto.", "¿Eso fue un clic o un espasmo?", "¡Qué terca eres, Jhanny!", 
            "Mi abuela es más rápida tocando botones.", "¿Así persigues lo que quieres?", "¡Trolleadísima!", 
            "El SÍ es lava, ¡no lo toques!", "¿Ya te cansaste de fracasar?", "¡Por ahí no es!", 
            "Ese dedo necesita vitaminas.", "¿Necesitas un mapa para encontrarme?", "Casi... pero NO.", 
            "Instalando modo 'para bebés'...", "¿Sentiste eso? Fue el viento de mi velocidad.", "¡Uupsi! Por aquí no.",
            "¡Eres un meme andante!", "No sirves para esto, acéptalo.", "¿Te ríndes?", "Cada clic es un castigo, no un amor.",
            "El León está muy ocupado para tus clics.", "¡No me toques!", "¿No tienes nada mejor que hacer?", "¡Me muero de risa!",
            "Esa puntería... nivel 1.", "Si sigues, llamo a la policía del amor.", "¿Segura que no quieres rendirte?",
            "¡Qué risa me das!", "Error 404: Habilidad no encontrada.", "¿Ya lloraste?", "Me estoy enojando, Jhanny...",
            "¡Casi te doy el SÍ! Mentira 😂", "A este paso terminamos en 2030.", "No me vas a atrapar nunca.", 
            "¡Qué flojera das!", "¿Ya te cansaste de perder?", "Sigue intentando, exploradora de pacotilla.",
            "¡Atrapado! Ah no, fui yo.", "¡Qué pesada eres!", "Ya casi se me acaba la paciencia...", 
            "PRESIONA UNA VEZ MÁS... ¡SI PUEDES!"
        ];

        // Mover Jhanny (Emoji de Princesa) al lugar del clic
        document.body.addEventListener('click', (e) => {
            if(e.target.id === 'the-button' || btnMoving) return;
            const princess = document.createElement('div');
            princess.innerText = '👸🏻';
            princess.style.position = 'fixed';
            princess.style.fontSize = '30px';
            princess.style.left = e.clientX - 15 + 'px';
            princess.style.top = e.clientY - 15 + 'px';
            princess.style.pointerEvents = 'none';
            princess.style.zIndex = '100';
            princess.style.transition = 'opacity 1s';
            document.body.appendChild(princess);
            setTimeout(() => { princess.style.opacity = '0'; setTimeout(() => princess.remove(), 1000); }, 100);
        });

        function handlePress() {
            if(btnMoving) return; // Evitar spam de clics
            clicks++;
            document.getElementById('clicks').innerText = clicks;
            
            // Efecto Confeti tierno
            confetti({ particleCount: 20, spread: 30, colors: ['#ff4d6d', '#ffb703'], origin: { y: 0.7 } });

            // Actualizar mensaje (40 mensajes)
            if (clicks < trollMessages.length) {
                bubble.innerText = trollMessages[clicks];
            }

            // Lógica de Niveles (Más fácil que antes)
            if (level === 1) {
                // Nivel 1: El botón se rinde fácil
                if (clicks >= 5) {
                    nextLevel(2);
                }
            } else if (level === 2) {
                // Nivel 2: El botón huye DESPUÉS del clic
                moveButton();
                if (clicks >= 15) {
                    nextLevel(3);
                }
            } else if (level === 3) {
                // Nivel 3: El botón huye rápido y cambia de tamaño
                moveButton();
                btn.style.transform = `scale(${0.6 + Math.random() * 0.8})`;
                if (clicks >= 30) {
                    win();
                }
            }
        }

        function moveButton() {
            btnMoving = true;
            btn.style.transition = 'all 0.3s ease-out';
            const area = document.getElementById('game-area');
            const maxX = area.clientWidth - btn.clientWidth;
            const maxY = area.clientHeight - btn.clientHeight;
            
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            btn.style.position = 'absolute';
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
            setTimeout(() => btnMoving = false, 300);
        }

        function nextLevel(n) {
            level = n;
            document.getElementById('lvl').innerText = n;
            bubble.innerText = `¡NIVEL ${n}! Ahora sí me voy a mover...`;
            bubble.style.color = 'var(--rosa-amor)';
            btn.style.transition = 'all 0.5s ease-out';
            if(n===3) btn.innerText = 'SÍ'; // Engaño
        }

        function win() {
            gameRunning = false;
            document.getElementById('win-screen').style.display = 'flex';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
