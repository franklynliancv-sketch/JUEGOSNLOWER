<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTUAL BOYFRIEND | PARA JHANNY</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --romance-pink: #ff4d6d;
            --soft-pink: #fff0f3;
            --gold: #ffb703;
            --dark-pink: #590d22;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--soft-pink);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: var(--dark-pink);
        }

        #game-card {
            width: 90%;
            max-width: 400px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.2);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        /* Cabecera */
        #header {
            background: var(--romance-pink);
            padding: 20px;
            color: white;
            text-align: center;
        }

        #love-bar-container {
            width: 80%;
            height: 10px;
            background: rgba(255,255,255,0.3);
            border-radius: 5px;
            margin: 10px auto;
        }

        #love-bar {
            width: 0%;
            height: 100%;
            background: var(--gold);
            border-radius: 5px;
            transition: width 0.5s;
        }

        /* Avatar y Diálogo */
        #visual-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        #avatar {
            font-size: 80px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        #dialogue-box {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.4;
            min-height: 80px;
            padding: 0 10px;
        }

        /* Opciones */
        #options-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: white;
            border: 2px solid var(--romance-pink);
            padding: 15px;
            border-radius: 15px;
            color: var(--romance-pink);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .option-btn:active {
            background: var(--romance-pink);
            color: white;
            transform: scale(0.98);
        }

        /* Pantallas Finales */
        .screen-overlay {
            position: absolute;
            inset: 0;
            background: white;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
            z-index: 100;
        }

        .big-heart {
            font-size: 120px;
            color: var(--romance-pink);
            animation: heartbeat 1s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        #kiss-msg {
            font-family: 'Dancing Script', cursive;
            font-size: 40px;
            color: var(--romance-pink);
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="game-card">
        <div id="header">
            <h2 style="font-size: 14px; letter-spacing: 2px;">VIRTUAL BOYFRIEND</h2>
            <div id="love-bar-container"><div id="love-bar"></div></div>
            <p id="lives-display">VIDAS: ❤️❤️❤️</p>
        </div>

        <div id="visual-area">
            <div id="avatar">🦁</div>
            <div id="dialogue-box">¡Hola mi Jhanny! ¿Estás lista para demostrar cuánto me conoces?</div>
        </div>

        <div id="options-container">
            <button class="option-btn" onclick="startGame()">¡Sí, vamos amor!</button>
        </div>

        <div id="win-screen" class="screen-overlay">
            <div class="big-heart">💋</div>
            <div id="kiss-msg">¡MUAAAK!</div>
            <p style="margin-top: 20px; font-weight: bold;">¡Felicidades mi vida! Has ganado mi corazón eterno y este beso gigante.</p>
            <button class="option-btn" style="margin-top: 30px;" onclick="location.reload()">Volver a jugar</button>
        </div>

        <div id="lose-screen" class="screen-overlay">
            <div style="font-size: 80px;">😿</div>
            <h2 style="margin: 20px 0;">¡Oh no, amor!</h2>
            <p>Parece que necesitamos recordar más momentos juntos. Pero no te preocupes, ¡yo te sigo amando!</p>
            <button class="option-btn" style="margin-top: 30px;" onclick="location.reload()">Intentar de nuevo</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        let currentStep = 0;
        let lives = 3;
        let loveScore = 0;

        const questions = [
            {
                q: "Si pudiéramos irnos de viaje mañana mismo, ¿a dónde crees que me gustaría llevarte?",
                options: [
                    { t: "A una playa tranquila", correct: true },
                    { t: "A escalar una montaña", correct: false },
                    { t: "A una ciudad ruidosa", correct: false }
                ]
            },
            {
                q: "¿Qué es lo que más me gusta de ti?",
                options: [
                    { t: "Tu sonrisa", correct: true },
                    { t: "Tu forma de hablar", correct: true }, // Ambas son lindas
                    { t: "Que eres una mandona jaja", correct: false }
                ]
            },
            {
                q: "¿Cuál es mi comida favorita cuando estoy contigo?",
                options: [
                    { t: "Cualquiera, si la comparto contigo", correct: true },
                    { t: "Ensalada pura", correct: false },
                    { t: "Comida rápida", correct: false }
                ]
            },
            {
                q: "¿Qué animal me representa más según yo?",
                options: [
                    { t: "Un gatito", correct: false },
                    { t: "Un León", correct: true },
                    { t: "Un osito", correct: false }
                ]
            },
            {
                q: "Cuando estamos lejos, ¿qué es lo primero que hago al pensar en ti?",
                options: [
                    { t: "Sonreír como tonto", correct: true },
                    { t: "Dormirme", correct: false },
                    { t: "Ponerme a trabajar", correct: false }
                ]
            }
        ];

        function startGame() {
            renderQuestion();
        }

        function renderQuestion() {
            if (currentStep >= questions.length) {
                winGame();
                return;
            }

            const data = questions[currentStep];
            document.getElementById('dialogue-box').innerText = data.q;
            document.getElementById('avatar').innerText = "🤔";
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";

            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn";
                btn.innerText = opt.t;
                btn.onclick = () => checkAnswer(opt.correct);
                container.appendChild(btn);
            });
        }

        function checkAnswer(isCorrect) {
            if (isCorrect) {
                loveScore += (100 / questions.length);
                document.getElementById('love-bar').style.width = loveScore + "%";
                document.getElementById('avatar').innerText = "😍";
                currentStep++;
                
                // Pequeño confeti de acierto
                confetti({ particleCount: 30, spread: 50, colors: ['#ff4d6d'] });
                
                setTimeout(renderQuestion, 1000);
            } else {
                lives--;
                updateLives();
                document.getElementById('avatar').innerText = "🥺";
                if (lives <= 0) {
                    loseGame();
                } else {
                    alert("¡Casi! Inténtalo de nuevo, amor.");
                }
            }
        }

        function updateLives() {
            let heartStr = "VIDAS: ";
            for(let i=0; i<3; i++) {
                heartStr += (i < lives) ? "❤️" : "🖤";
            }
            document.getElementById('lives-display').innerText = heartStr;
        }

        function winGame() {
            document.getElementById('win-screen').style.display = 'flex';
            confetti({
                particleCount: 200,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#ff4d6d', '#ffb703', '#ffffff']
            });
            
            // Efecto de muchos besos
            let interval = setInterval(() => {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff4d6d']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff4d6d']
                });
            }, 250);
            
            setTimeout(() => clearInterval(interval), 3000);
        }

        function loseGame() {
            document.getElementById('lose-screen').style.display = 'flex';
        }
    </script>
</body>
</html>
