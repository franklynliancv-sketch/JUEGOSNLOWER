<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DON'T PRESS IT!</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #d90429;
            --dark-red: #8d0801;
            --bg: #0b090a;
            --neon: #ef233c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }

        body {
            background-color: var(--bg);
            font-family: 'Bungee', cursive;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Contenedor de partículas */
        #particle-canvas {
            position: absolute; inset: 0; pointer-events: none; z-index: 1;
        }

        /* El Narrador / Texto Troll */
        #narrator-container {
            position: absolute; top: 10%; width: 90%; max-width: 450px;
            z-index: 10; pointer-events: none;
        }

        #bubble {
            background: white; color: black; padding: 20px;
            border-radius: 10px; border: 4px solid var(--red);
            font-family: 'Press Start 2P', cursive; font-size: 11px;
            text-align: center; line-height: 1.8;
            box-shadow: 10px 10px 0px var(--dark-red);
            position: relative;
        }

        #bubble::after {
            content: ''; position: absolute; bottom: -20px; left: 50%;
            border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-top: 20px solid var(--red); transform: translateX(-50%);
        }

        /* El Botón Maestro */
        #btn-stage {
            position: relative; width: 100vw; height: 60vh;
            display: flex; align-items: center; justify-content: center; z-index: 5;
        }

        .red-button {
            width: 140px; height: 140px; background: var(--red);
            border-radius: 50%; border: 6px solid var(--dark-red);
            box-shadow: 0 10px 0 var(--dark-red), 0 0 40px rgba(239, 35, 60, 0.4);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 50px; position: absolute;
            transition: transform 0.1s;
        }

        .red-button:active { transform: scale(0.9) translateY(8px); box-shadow: 0 2px 0 var(--dark-red); }

        /* Estados Especiales */
        .glitch-effect { animation: glitch 0.1s infinite; }
        @keyframes glitch {
            0% { transform: translate(2px, -2px); filter: hue-rotate(90deg); }
            50% { transform: translate(-2px, 2px); filter: invert(1); }
            100% { transform: translate(1px, 1px); }
        }

        /* Pantalla de Victoria */
        #victory {
            position: fixed; inset: 0; background: white;
            display: none; flex-direction: column; align-items: center;
            justify-content: center; z-index: 1000; color: black;
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Barra de Progreso Troll */
        #progress-bar {
            position: absolute; bottom: 50px; width: 80%; height: 20px;
            background: #333; border: 3px solid white; border-radius: 10px;
            overflow: hidden;
        }
        #progress-fill {
            width: 0%; height: 100%; background: var(--neon);
            transition: width 0.3s;
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div id="narrator-container">
        <div id="bubble">ADVERTENCIA:<br>NO TOCAR EL BOTÓN ROJO</div>
    </div>

    <div id="btn-stage">
        <div id="main-btn" class="red-button">🦁</div>
    </div>

    <div id="progress-bar">
        <div id="progress-fill"></div>
    </div>

    <div id="victory">
        <h1 style="font-size: 40px;">¡ME RENDÍ!</h1>
        <p style="margin: 20px; text-align: center;">Jhanny, eres demasiado persistente.<br>Toma mi corazón.</p>
        <div style="font-size: 100px;">🦁💖👸🏻</div>
        <button onclick="location.reload()" style="margin-top: 30px; padding: 15px; font-family: 'Bungee'; cursor: pointer;">REINTENTAR</button>
    </div>

    <script>
        const btn = document.getElementById('main-btn');
        const bubble = document.getElementById('bubble');
        const fill = document.getElementById('progress-fill');
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let clicks = 0;
        let particles = [];
        const maxClicks = 40;

        const trollMessages = [
            "¡Hey! Te dije que no.", "¿No sabes leer?", "Oye, eso dolió un poquito.",
            "¡Basta Jhanny!", "Si sigues, llamo al León.", "¡Upa! Casi me atrapas.",
            "¡Soy flash! ⚡", "Jajaja, ¡qué lenta!", "¿Ese es tu mejor dedo?",
            "Instalando modo difícil...", "¡Trolleadísima!", "¡Boom! (Broma)",
            "¿Ya te cansaste, reina?", "¡Soy invisible! 👻", "¡Clones activados!",
            "Esa puntería... nivel 1.", "No me toques ahí.", "¡Ups! Error 404.",
            "Jhanny, ve a comer un muffin.", "¡Ja! Te engañé.", "¿Sigues aquí?",
            "¡Me estoy enojando!", "Cada clic es un castigo.", "¡No podrás ganarme!",
            "¡Soy el botón legendario!", "Ríndete y te doy un dulce.", "¡Vaya fail!",
            "¡Mira detrás de ti! 🦁", "¡Me muevo solo!", "¡Casi! Pero NO.",
            "¿Tanto quieres un SÍ?", "¡Soy intocable!", "¡Glitch mental!",
            "¡Qué pesada eres!", "Te faltan vitaminas.", "¡Estoy sudando!",
            "¡Ya casi... o tal vez no!", "¡Última oportunidad!", "¡Está bien, tú ganas!",
            "¡PRESIONA UNA VEZ MÁS!"
        ];

        // Clase Partícula para efectos visuales
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.size = Math.random() * 5 + 2;
                this.speedX = Math.random() * 6 - 3;
                this.speedY = Math.random() * 6 - 3;
                this.color = color;
                this.life = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.02;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, '#ff003c'));
            }
        }

        function moveButtonRandomly() {
            const stage = document.getElementById('btn-stage');
            const x = Math.random() * (stage.clientWidth - 150);
            const y = Math.random() * (stage.clientHeight - 150);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function handlePress(e) {
            clicks++;
            createExplosion(e.clientX || e.touches[0].clientX, e.clientY || e.touches[0].clientY);
            
            // Actualizar barra y mensajes
            const progress = (clicks / maxClicks) * 100;
            fill.style.width = progress + '%';
            
            if (clicks < trollMessages.length) {
                bubble.innerText = trollMessages[clicks];
            }

            // FASES DEL JUEGO
            // Fase 1: Movimiento simple
            if (clicks >= 5 && clicks < 15) {
                moveButtonRandomly();
            }
            
            // Fase 2: Velocidad y Clones
            if (clicks >= 15 && clicks < 25) {
                btn.style.transition = 'all 0.05s'; // Más rápido
                moveButtonRandomly();
                if(Math.random() > 0.5) btn.style.opacity = '0.3';
                else btn.style.opacity = '1';
            }

            // Fase 3: Modo Glitch e invisible
            if (clicks >= 25 && clicks < 35) {
                btn.classList.add('glitch-effect');
                moveButtonRandomly();
                document.body.style.backgroundColor = (clicks % 2 === 0) ? '#1a1a1a' : '#0b090a';
            }

            // Fase Final: El botón se rinde
            if (clicks >= 38) {
                btn.classList.remove('glitch-effect');
                btn.style.opacity = '1';
                btn.style.left = '50%';
                btn.style.top = '50%';
                btn.style.transform = 'translate(-50%, -50%) scale(2)';
                btn.innerHTML = '✨SÍ✨';
            }

            if (clicks >= maxClicks) {
                document.getElementById('victory').style.display = 'flex';
            }

            // Sacudida de cámara
            document.body.classList.add('shake');
            setTimeout(() => document.body.classList.remove('shake'), 100);
        }

        // Listener para clics y toques
        btn.addEventListener('pointerdown', handlePress);

        // Bucle de animación para partículas
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(index, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();

        // Ajustar canvas
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>

    <style>
        .shake { animation: screenShake 0.1s linear 2; }
        @keyframes screenShake {
            0% { transform: translate(5px, 5px); }
            50% { transform: translate(-5px, -5px); }
            100% { transform: translate(0); }
        }
    </style>
</body>
</html>
