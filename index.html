<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIVE UP? - JHANNY EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { 
            background: #1a1a1a; 
            font-family: 'Bungee', cursive; 
            overflow: hidden; 
            color: white; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        #game-container {
            position: relative;
            width: 100vw; max-width: 600px;
            height: 80vh; max-height: 400px;
            background: #222;
            border: 4px solid #444;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }
        
        /* UI */
        #ui {
            position: absolute; top: 10px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 20px;
            pointer-events: none; z-index: 10; font-size: 12px;
        }
        #narrator {
            position: absolute; top: 50px; width: 100%;
            text-align: center; color: #ff003c; font-size: 14px;
            text-shadow: 2px 2px 0px black; z-index: 10;
        }

        /* Controles */
        #controls {
            position: fixed; bottom: 20px; width: 100%;
            display: flex; justify-content: space-around; padding: 0 20px;
        }
        .btn-ctrl {
            width: 70px; height: 70px; background: rgba(255,255,255,0.1);
            border: 3px solid white; border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; color: white;
        }
        .btn-ctrl:active { background: white; color: black; }

        /* Overlay Final */
        #final-screen {
            position: absolute; inset: 0; background: rgba(255, 77, 109, 0.95);
            display: none; flex-direction: column; align-items: center;
            justify-content: center; z-index: 100; text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui">
            <div>MUERTES: <span id="deaths">0</span></div>
            <div>NIVEL: <span id="lvl-display">1/4</span></div>
        </div>
        <div id="narrator">¿POR QUÉ SIGUES INTENTANDO?</div>
        <canvas id="gameCanvas"></canvas>
        
        <div id="final-screen">
            <h1 style="font-size: 40px;">¡BOOYAH!</h1>
            <p style="margin: 20px; font-family: 'Montserrat';">No te rendiste y por fin atrapaste mi "SÍ".</p>
            <div style="font-size: 60px;">🦁💖👸🏻</div>
            <button onclick="location.reload()" style="padding: 10px 20px; margin-top: 20px; font-family: 'Bungee';">REPETIR</button>
        </div>
    </div>

    <div id="controls">
        <div style="display: flex; gap: 10px;">
            <div class="btn-ctrl" onpointerdown="keys.left=true" onpointerup="keys.left=false">←</div>
            <div class="btn-ctrl" onpointerdown="keys.right=true" onpointerup="keys.right=false">→</div>
        </div>
        <div class="btn-ctrl" style="background: #ff4d6d;" onpointerdown="jump()">↑</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600; canvas.height = 400;

        let deaths = 0;
        let currentLevel = 1;
        const keys = { left: false, right: false };
        
        // Entidades
        let player = { x: 50, y: 300, w: 20, h: 20, vx: 0, vy: 0, grounded: false };
        let exit = { x: 530, y: 300, w: 40, h: 60 };
        let spikes = [];
        let platforms = [];

        const phrases = [
            "Es demasiado difícil para ti...",
            "Mejor ve a dormir, Jhanny.",
            "Ese botón de SÍ es inalcanzable.",
            "¡Cuidado con los pinchos!",
            "¿Otra muerte más? Qué mal...",
            "¡Ríndete ya!",
            "Casi... pero NO."
        ];

        function loadLevel(l) {
            platforms = [
                { x: 0, y: 360, w: 600, h: 40 }, // Suelo
                { x: 0, y: 0, w: 20, h: 400 },   // Pared izq
                { x: 580, y: 0, w: 20, h: 400 }  // Pared der
            ];
            spikes = [];
            player.x = 50; player.y = 300; player.vx = 0; player.vy = 0;
            document.getElementById('lvl-display').innerText = `${l}/4`;
            document.getElementById('narrator').innerText = phrases[Math.floor(Math.random()*phrases.length)];

            if (l >= 1) { // Nivel 1: El inicio
                platforms.push({ x: 250, y: 280, w: 100, h: 20 });
            }
            if (l >= 2) { // Nivel 2: Pinchos básicos
                spikes.push({ x: 200, y: 340, w: 200, h: 20 });
            }
            if (l >= 3) { // Nivel 3: El salto de fe
                platforms.push({ x: 150, y: 220, w: 80, h: 20 });
                platforms.push({ x: 350, y: 150, w: 80, h: 20 });
                spikes.push({ x: 0, y: 340, w: 580, h: 20 }); // Suelo mortal
            }
            if (l >= 4) { // Nivel 4: Final Boss (El SÍ se mueve)
                platforms.push({ x: 100, y: 300, w: 50, h: 10 });
                platforms.push({ x: 200, y: 240, w: 50, h: 10 });
                platforms.push({ x: 300, y: 180, w: 50, h: 10 });
                platforms.push({ x: 400, y: 120, w: 50, h: 10 });
                spikes.push({ x: 0, y: 340, w: 600, h: 20 });
            }
        }

        function jump() {
            if (player.grounded) {
                player.vy = -10;
                player.grounded = false;
            }
        }

        function update() {
            // Gravedad y fricción
            player.vy += 0.5; 
            if(keys.left) player.vx = -4;
            else if(keys.right) player.vx = 4;
            else player.vx *= 0.8;

            player.x += player.vx;
            player.y += player.vy;

            player.grounded = false;

            // Colisiones Plataformas
            platforms.forEach(p => {
                if (player.x < p.x + p.w && player.x + player.w > p.x &&
                    player.y < p.y + p.h && player.y + player.h > p.y) {
                    
                    // Colisión por arriba
                    if (player.vy > 0 && player.y + player.h - player.vy <= p.y) {
                        player.y = p.y - player.h;
                        player.vy = 0;
                        player.grounded = true;
                    }
                    // Colisión por abajo
                    else if (player.vy < 0 && player.y - player.vy >= p.y + p.h) {
                        player.y = p.y + p.h;
                        player.vy = 0;
                    }
                    // Laterales
                    else {
                        player.x -= player.vx;
                        player.vx = 0;
                    }
                }
            });

            // Colisión Pinchos
            spikes.forEach(s => {
                if (player.x < s.x + s.w && player.x + player.w > s.x &&
                    player.y < s.y + s.h && player.y + player.h > s.y) {
                    die();
                }
            });

            // Colisión Salida (Botón SÍ)
            if (player.x < exit.x + exit.w && player.x + player.w > exit.x &&
                player.y < exit.y + exit.h && player.y + player.h > exit.y) {
                nextLevel();
            }

            // Nivel 4: Salida se mueve
            if(currentLevel === 4) {
                exit.y = 80;
                exit.x = 410;
            }
        }

        function die() {
            deaths++;
            document.getElementById('deaths').innerText = deaths;
            loadLevel(currentLevel);
        }

        function nextLevel() {
            currentLevel++;
            if (currentLevel > 4) {
                document.getElementById('final-screen').style.display = 'flex';
            } else {
                loadLevel(currentLevel);
            }
        }

        function draw() {
            ctx.fillStyle = "#222";
            ctx.fillRect(0,0,canvas.width, canvas.height);

            // Dibujar Plataformas
            ctx.fillStyle = "#444";
            platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

            // Dibujar Pinchos
            ctx.fillStyle = "#ff003c";
            spikes.forEach(s => {
                for(let i=0; i<s.w; i+=20) {
                    ctx.beginPath();
                    ctx.moveTo(s.x + i, s.y + s.h);
                    ctx.lineTo(s.x + i + 10, s.y);
                    ctx.lineTo(s.x + i + 20, s.y + s.h);
                    ctx.fill();
                }
            });

            // Dibujar Botón SÍ (La Salida)
            ctx.fillStyle = "#39ff14";
            ctx.fillRect(exit.x, exit.y, exit.w, exit.h);
            ctx.fillStyle = "black";
            ctx.font = "12px Bungee";
            ctx.fillText("SÍ", exit.x + 10, exit.y + 35);

            // Dibujar Player (Jhanny)
            ctx.fillStyle = "#ff4d6d";
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = "white";
            ctx.font = "14px Arial";
            ctx.fillText("👸🏻", player.x - 2, player.y + 15);
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loadLevel(1);
        loop();
    </script>
</body>
</html>
