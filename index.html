<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUPERSISTᶜ| IMPOSSIBLE EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-player: #00f2ff;
            --rojo-enemigo: #ff004c;
            --meta-verde: #00ff88;
            --fondo: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 350px;
            height: 250px;
            background: var(--fondo);
            border: 4px solid #333;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 0, 76, 0.2);
        }

        .zone {
            position: absolute;
            width: 50px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            z-index: 1;
        }
        .start { left: 0; background: #222; border-right: 2px solid #444; }
        .end { right: 0; background: var(--meta-verde); color: #000; }

        #player {
            position: absolute;
            width: 18px;
            height: 18px;
            background: var(--azul-player);
            box-shadow: 0 0 10px var(--azul-player);
            left: 15px;
            top: 110px;
            z-index: 10;
            transition: transform 0.1s;
        }

        .enemy {
            position: absolute;
            width: 14px;
            height: 14px;
            background: var(--rojo-enemigo);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--rojo-enemigo);
        }

        .ui { text-align: center; margin-bottom: 10px; }
        #insult-box {
            height: 40px;
            color: #ff4444;
            font-style: italic;
            font-size: 14px;
            margin-top: 5px;
        }

        .controls {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(3, 70px);
            gap: 10px;
        }
        .btn-ctrl {
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 20px;
            border-radius: 12px;
            font-weight: bold;
            user-select: none;
        }
        .btn-ctrl:active { background: #ff004c; }
        
        #level-indicator { color: #00ff88; font-size: 1.2em; }
    </style>
</head>
<body>

    <div class="ui">
        <h2 id="level-indicator">NIVEL 1</h2>
        <p id="death-count">MUERTES: 0</p>
        <div id="insult-box">¿Listo para fracasar?</div>
    </div>

    <div id="game-container">
        <div class="zone start">SAFE</div>
        <div class="zone end">META</div>
        <div id="player"></div>
    </div>

    <div class="controls">
        <div></div>
        <button class="btn-ctrl" onpointerdown="move('up')">↑</button>
        <div></div>
        <button class="btn-ctrl" onpointerdown="move('left')">←</button>
        <button class="btn-ctrl" onpointerdown="move('down')">↓</button>
        <button class="btn-ctrl" onpointerdown="move('right')">→</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const player = document.getElementById('player');
        const container = document.getElementById('game-container');
        const insultBox = document.getElementById('insult-box');
        const levelDisplay = document.getElementById('level-indicator');
        
        let posX = 15;
        let posY = 110;
        let deaths = 0;
        let currentLevel = 1;
        let enemies = [];
        let enemyElements = [];

        const insults = [
            "No puedes, acéptalo.",
            "¿Eso fue todo? Patético.",
            "Mi abuela juega mejor con los ojos cerrados.",
            "Ríndete, ahorra tiempo.",
            "¿Instalaste el juego con los pies?",
            "La persistencia no quita lo manco.",
            "Error de capa 8 detectado.",
            "¿Ya te cansaste de perder?",
            "Vuelve al Candy Crush, esto es mucho para ti.",
            "¿Te ayudo? Ah no, no puedo, soy una IA.",
            "A este paso terminarás en el 2050.",
            "¡Qué vergüenza!",
            "¿Eso fue un intento o un espasmo?",
            "El botón de 'Cerrar' está arriba, úsalo.",
            "Inútil, pero persistente. Te doy eso.",
            "Ni con trampas pasarías este nivel.",
            "¿En serio moriste ahí?",
            "Tu nivel de habilidad es negativo.",
            "Deja de intentarlo, das lástima.",
            "¿Quieres que llame a tu mamá para que te ayude?"
        ];

        function initLevel(level) {
            // Limpiar enemigos anteriores
            enemyElements.forEach(el => el.remove());
            enemies = [];
            enemyElements = [];

            if (level === 1) {
                for(let i=0; i<5; i++) {
                    enemies.push({ x: 80 + (i*45), y: i*40, dir: 1, speed: 5, type: 'vertical' });
                }
            } else if (level === 2) {
                for(let i=0; i<6; i++) {
                    enemies.push({ x: 70 + (i*40), y: i*30, dir: 1, speed: 8, type: 'vertical' });
                    enemies.push({ x: 100, y: 50 + (i*30), dir: 1, speed: 4, type: 'horizontal' });
                }
            } else if (level === 3) {
                for(let i=0; i<8; i++) {
                    enemies.push({ x: 60 + (i*30), y: Math.random()*200, dir: 1, speed: 7 + i, type: 'vertical' });
                }
                enemies.push({ x: 150, y: 125, dir: 1, speed: 12, type: 'circular', angle: 0 });
            }

            enemies.forEach(en => {
                const el = document.createElement('div');
                el.className = 'enemy';
                container.appendChild(el);
                enemyElements.push(el);
            });
            
            levelDisplay.innerText = "NIVEL " + currentLevel;
        }

        function update() {
            enemies.forEach((en, i) => {
                if (en.type === 'vertical') {
                    en.y += en.dir * en.speed;
                    if (en.y > 230 || en.y < 0) en.dir *= -1;
                } else if (en.type === 'horizontal') {
                    en.x += en.dir * en.speed;
                    if (en.x > 280 || en.x < 60) en.dir *= -1;
                }

                enemyElements[i].style.left = en.x + 'px';
                enemyElements[i].style.top = en.y + 'px';

                // Colisión ajustada (Hitbox más estricta)
                if (Math.abs(posX - en.x) < 16 && Math.abs(posY - en.y) < 16) {
                    resetPlayer();
                }
            });

            if (posX > 310) {
                nextLevel();
            }
            requestAnimationFrame(update);
        }

        function move(dir) {
            const step = 12;
            if (dir === 'up' && posY > 5) posY -= step;
            if (dir === 'down' && posY < 225) posY += step;
            if (dir === 'left' && posX > 5) posX -= step;
            if (dir === 'right' && posX < 330) posX += step;
            
            player.style.left = posX + 'px';
            player.style.top = posY + 'px';
        }

        function resetPlayer() {
            deaths++;
            document.getElementById('death-count').innerText = "MUERTES: " + deaths;
            insultBox.innerText = insults[Math.floor(Math.random() * insults.length)];
            posX = 15;
            posY = 110;
            player.style.left = posX + 'px';
            player.style.top = posY + 'px';
            player.style.transform = "scale(1.5)";
            setTimeout(() => player.style.transform = "scale(1)", 100);
        }

        function nextLevel() {
            if (currentLevel < 3) {
                currentLevel++;
                posX = 15;
                posY = 110;
                initLevel(currentLevel);
                insultBox.innerText = "Suerte de principiante. Nivel " + currentLevel + "...";
            } else {
                win();
            }
        }

        function win() {
            confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
            posX = -500;
            alert("¡INCREÍBLE! Has superado el reto SUPERSISTᶜᵛ.\nMuertes totales: " + deaths);
            window.location.reload();
        }

        // Teclado para PC
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') move('up');
            if (e.key === 'ArrowDown') move('down');
            if (e.key === 'ArrowLeft') move('left');
            if (e.key === 'ArrowRight') move('right');
        });

        initLevel(1);
        update();
    </script>
</body>
</html>
